name: Report a project
description: Dead link, wrong data, deprecated project, or something that shouldn't be listed. Feeds the hygiene sweep.
title: "[report] "
labels: ["report"]
body:
  - type: input
    id: project
    attributes:
      label: Project name (or its satohub.ai slug)
    validations:
      required: true
  - type: dropdown
    id: kind
    attributes:
      label: What's wrong
      options:
        - Dead link / project gone
        - Wrong or outdated data (chains, description, URLs)
        - Project is deprecated / abandoned
        - Suspected malicious or misrepresenting itself
        - Score dispute (see NEUTRALITY.md)
        - Other
    validations:
      required: true
  - type: input
    id: evidence
    attributes:
      label: Evidence URL
      description: A link that shows the problem (404 page, archived repo, announcement, etc.)
  - type: textarea
    id: details
    attributes:
      label: Details
    validations:
      required: true
