name: update-index

# Nightly re-render from the public Sato Hub export (pull-based: this repo
# subscribes to https://satohub.ai/api/export/index.json; the upstream pipeline
# never pushes here). Runs at 12:30 UTC — the upstream daily refresh is CRONed
# at 08:00 UTC but GitHub cron drifts up to ~3h, so we sit well clear of it.

on:
  schedule:
    - cron: "30 12 * * *"
  workflow_dispatch: {}

concurrency:
  group: update-index
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Render index
        run: node scripts/generate.mjs
      - name: Commit if changed
        run: |
          git config user.name "Sato"
          git config user.email "304106862+satohubai@users.noreply.github.com"
          git add README.md data/
          if git diff --cached --quiet; then
            echo "no changes"
          else
            COUNT=$(node -e "console.log(require('./data/index.json').count)")
            git commit -m "index update: $(date -u +%F) — ${COUNT} entries"
            git push
          fi
